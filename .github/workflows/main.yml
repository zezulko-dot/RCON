name: Build RCON

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build with Gradle (wrapper or fallback)
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew build
          elif [ -f "build.gradle" ]; then
            gradle build
          elif [ -f "pom.xml" ]; then
            mvn package
          else
            echo "No build system found!"
            exit 1
          fi

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: RCON
          path: |
            **/*.jar
